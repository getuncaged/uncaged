<polyline points="36,49 52,60 36,71" fill="none" stroke="#FF0000" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<line x1="53" y1="71" x2="69" y2="71" stroke="#FF0000" stroke-width="5" stroke-linecap="round"/>
</svg>
