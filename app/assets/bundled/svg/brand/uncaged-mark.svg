<svg width="24" height="24" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Uncaged mark: a terminal cage with its right wall broken open, holding the
     ❯_ prompt. Terminal + cage + broken = uncaged, drawn. Single-colour
     recolour sentinel (#FF0000); the app's icon pipeline tints it to the
     requested colour. Canonical in-app mark — see app/src/brand.rs and the
     Uncaged design system master logo/glyph.svg. -->
